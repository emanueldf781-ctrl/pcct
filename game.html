<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Runner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  color: white;
}

canvas {
  background: linear-gradient(#020617, #111827);
  border: 3px solid #38bdf8;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(56, 189, 248, 0.5);
}

.info {
  position: absolute;
  top: 20px;
  text-align: center;
}

.info h1 {
  font-size: 32px;
  margin-bottom: 5px;
}

.info p {
  opacity: 0.8;
}

  </style>
</head>
<body>  <div class="info">
    <h1>🚀 Space Runner</h1>
    <p>Use ← → para mover e desviar dos asteroides</p>
  </div><canvas id="game" width="420" height="650"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const player = {
      x: 190,
      y: 560,
      width: 40,
      height: 60,
      speed: 6
    };

    let obstacles = [];
    let score = 0;
    let gameOver = false;

    const keys = {};

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (gameOver && e.key === 'Enter') {
        restartGame();
      }
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function drawPlayer() {
      ctx.fillStyle = '#38bdf8';

      ctx.beginPath();
      ctx.moveTo(player.x + 20, player.y);
      ctx.lineTo(player.x, player.y + 60);
      ctx.lineTo(player.x + 40, player.y + 60);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(player.x + 15, player.y + 18, 10, 20);
    }

    function createObstacle() {
      const size = Math.random() * 35 + 25;

      obstacles.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        speed: Math.random() * 3 + 3
      });
    }

    function drawObstacles() {
      ctx.fillStyle = '#f97316';

      obstacles.forEach((obs) => {
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, obs.width / 2, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function updateObstacles() {
      obstacles.forEach((obs, index) => {
        obs.y += obs.speed;

        if (obs.y > canvas.height + 50) {
          obstacles.splice(index, 1);
          score++;
        }

        if (
          player.x < obs.x + obs.width &&
          player.x + player.width > obs.x &&
          player.y < obs.y + obs.height &&
          player.y + player.height > obs.y
        ) {
          gameOver = true;
        }
      });
    }

    function movePlayer() {
      if (keys['ArrowLeft'] && player.x > 0) {
        player.x -= player.speed;
      }

      if (keys['ArrowRight'] && player.x + player.width < canvas.width) {
        player.x += player.speed;
      }
    }

    function drawScore() {
      ctx.fillStyle = 'white';
      ctx.font = '24px Arial';
      ctx.fillText('Pontos: ' + score, 15, 35);
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'white';
      ctx.font = '40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, 300);

      ctx.font = '22px Arial';
      ctx.fillText('Pontuação: ' + score, canvas.width / 2, 350);

      ctx.font = '18px Arial';
      ctx.fillText('Pressione ENTER para reiniciar', canvas.width / 2, 400);
    }

    function restartGame() {
      obstacles = [];
      score = 0;
      gameOver = false;
      player.x = 190;
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      movePlayer();
      drawPlayer();
      drawObstacles();
      updateObstacles();
      drawScore();

      if (!gameOver) {
        requestAnimationFrame(gameLoop);
      } else {
        drawGameOver();
      }
    }

    setInterval(() => {
      if (!gameOver) {
        createObstacle();
      }
    }, 900);

    gameLoop();
  </script></body>
</html>
